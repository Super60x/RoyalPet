name: Publish scheduled SEO pages

on:
  # Run daily at 6am Amsterdam time (4am UTC)
  schedule:
    - cron: '0 4 * * *'

  # Manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run publish script
        run: npx tsx scripts/publish-pages.ts

      - name: Check if pages were published
        id: changes
        run: |
          git diff --quiet data/seo-pages.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seo-pages.json
          git commit -m "auto: publish scheduled SEO pages $(date +%Y-%m-%d)"
          git push

      - name: No changes
        if: steps.changes.outputs.changed != 'true'
        run: echo "No pages due for publishing today."
